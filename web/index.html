<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A whiteboard app with widgets.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="h3xBoard">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    /* Loading message, error message, retry button */
    body {
      margin: 0;
    }

    #loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    #loading-message {
      font-family: sans-serif;
      font-size: 16px;
      font-weight: bold;
      color: #666;
      margin: 0;
    }

    #error-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      font-family: sans-serif;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    #error-message {
      font-size: 16px;
      color: #c0392b;
      margin: 0;
    }

    #retry-button {
      padding: 10px 24px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }

    #retry-button:hover {
      background: #f5f5f5;
    }

    /* Copied from https://lukehaas.me/projects/css-loaders/ */
    .loader,
    .loader:after {
      border-radius: 50%;
      width: 2.75em;
      height: 2.75em;
    }
    .loader {
      margin: 16px auto;
      font-size: 10px;
      position: relative;
      text-indent: -9999em;
      border-top: 0.5em solid rgba(0, 0, 0, 0.2);
      border-right: 0.5em solid rgba(0, 0, 0, 0.2);
      border-bottom: 0.5em solid rgba(0, 0, 0, 0.2);
      border-left: 0.5em solid #00cd66;
      -webkit-transform: translateZ(0);
      -ms-transform: translateZ(0);
      transform: translateZ(0);
      -webkit-animation: load8 1.1s infinite linear;
      animation: load8 1.1s infinite linear;
    }
    @-webkit-keyframes load8 {
      0% {
        -webkit-transform: rotate(0deg);
        transform: rotate(0deg);
      }
      100% {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }
    @keyframes load8 {
      0% {
        -webkit-transform: rotate(0deg);
        transform: rotate(0deg);
      }
      100% {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }
  </style>

  <title>h3xBoard</title>
  <link rel="manifest" href="manifest.json">

  <!-- Runtime configuration (window.h3xboardConfig). Loaded before the Flutter
       bootstrap so Config.apiUrl can read it. See web/config.js. -->
  <script src="config.js"></script>
</head>
<body>
  <div id="loading-container">
    <div class="loader">Loading...</div>
    <p id="loading-message">Loading h3xBoard ...</p>
  </div>
  <div id="error-container">
    <p id="error-message">Failed to load the h3xBoard application.</p>
    <button id="retry-button" onclick="window.location.reload()">Try again</button>
  </div>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    // Custom loading procedure which shows basic progress.
    // Adapted from: https://docs.flutter.dev/platform-integration/web/initialization

    const loadingContainer = document.getElementById('loading-container');
    const loadingMessage = document.getElementById('loading-message');
    const errorContainer = document.getElementById('error-container');

    function showError() {
      loadingContainer.remove();
      errorContainer.style.display = 'flex';
    }

    _flutter.loader.load({
      onEntrypointLoaded: async function(engineInitializer) {
        try {
          loadingMessage.textContent = 'Initializing engine...';
          const appRunner = await engineInitializer.initializeEngine();

          loadingMessage.textContent = 'Starting app...';
          await appRunner.runApp();

          loadingContainer.remove();
        } catch (e) {
          showError();
        }
      }
    });
  </script>
</body>
</html>
