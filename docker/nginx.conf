# Inspired by: https://dev.to/it-wibrc/guide-to-containerizing-a-modern-javascript-spa-vuevitereact-with-a-multi-stage-nginx-build-1lma
events {}
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  types {
    application/javascript mjs;
  }

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security: Hides the Nginx version
    server_tokens off;

    # SPA Routing: Directs all unmatched requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config must never be cached, so a redeploy with a changed API_URL
    # is picked up immediately instead of serving a stale value.
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    # Security: Block access to hidden files
    location ~ /\. {
        deny all;
    }

    add_header Cross-Origin-Embedder-Policy credentialless;
    add_header Cross-Origin-Opener-Policy same-origin;
  }
}
