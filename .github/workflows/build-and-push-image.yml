name: Build and push image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Flutter version
        uses: kuhnroyal/flutter-fvm-config-action@v3

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}
          cache: true
          cache-sdk: true

      - name: Disable Flutter analytics and CLI animations
        run: flutter config --no-analytics --no-cli-animations

      - name: Flutter SDK precache
        run: flutter precache --web

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter packages get

      - name: Run code generation
        run: dart run build_runner build

      - name: Flutter analyze
        run: flutter analyze

      # --- Docker build (no base-href) ---
      - name: Build web (Docker)
        run: |
          rm -rf build/web
          flutter build web --release --wasm

      - name: Upload web build artifact (Docker)
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build/web

  Push-GHCR:
    name: Push-GHCR (${{ matrix.platform }})
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Download web build
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: build/web

      - name: Prepare Docker context
        run: |
          mkdir docker
          cp -r build/web docker/html
          cat <<'EOF' > docker/nginx.conf
          # Inspired by: https://dev.to/it-wibrc/guide-to-containerizing-a-modern-javascript-spa-vuevitereact-with-a-multi-stage-nginx-build-1lma
          events {}
          http {
            include       /etc/nginx/mime.types;
            default_type  application/octet-stream;

            types {
              application/javascript mjs;
            }

            server {
              listen 80;
              root /usr/share/nginx/html;
              index index.html;

              # Security: Hides the Nginx version
              server_tokens off;

              # SPA Routing: Directs all unmatched requests to index.html
              location / {
                  try_files $uri $uri/ /index.html;
              }

              # Security: Block access to hidden files
              location ~ /\. {
                  deny all;
              }

              add_header Cross-Origin-Embedder-Policy credentialless;
              add_header Cross-Origin-Opener-Policy same-origin;
            }
          }
          EOF

          cat <<'EOF' > docker/Dockerfile
          FROM nginx:alpine
          COPY nginx.conf /etc/nginx/nginx.conf
          COPY html /usr/share/nginx/html
          EOF

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: docker
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest and push
    needs: Push-GHCR
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.IMAGE_NAME }}:latest \
            -t ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            $(printf 'ghcr.io/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
