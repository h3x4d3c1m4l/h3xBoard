name: Release - Web

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]

# Sets permissions to allow version tag and container image push
permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build

    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')) }}

    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Detect Flutter version
      uses: kuhnroyal/flutter-fvm-config-action@v3

    - name: Setup Flutter
      uses: hrishikesh-kadam/setup-flutter@v1
      with:
        ref: ${{ env.FLUTTER_VERSION }}
        setFlutterRootPath: 'true'
        addPubCacheBinToPath: 'true'
        flutterPrecache: '--web'

    - name: Disable Flutter analytics and CLI animations
      run: flutter config --no-analytics --no-cli-animations

    - name: Install dependencies
      run: flutter pub get --enforce-lockfile

    - name: Generate l10n
      run: flutter gen-l10n

    - name: Code generation
      run: dart run build_runner build

    - name: Flutter analyze
      run: flutter analyze

    - name: Build web app
      run: |
        rm -rf build/web
        flutter build web -v --no-pub --release --wasm --build-number=${{ github.run_number }}

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: web-build
        path: build/web

  push:
    name: Push to GHCR (${{ matrix.platform }})

    needs: build

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        name: web-build
        path: build/web

    - name: Prepare Docker context
      run: cp -r build/web docker/html

    - name: Set lowercase image name
      run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@v7
      with:
        context: docker
        platforms: ${{ matrix.platform }}
        outputs: type=image,name=ghcr.io/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

    - name: Export digest
      run: |
        mkdir -p /tmp/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "/tmp/digests/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@v7
      with:
        name: digest-${{ strategy.job-index }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  merge:
    name: Merge manifest and push

    needs: push

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5

    steps:
    - name: Set lowercase image name
      run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Download digests
      uses: actions/download-artifact@v8
      with:
        path: /tmp/digests
        pattern: digest-*
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create and push manifest list
      working-directory: /tmp/digests
      run: |
        docker buildx imagetools create \
          -t ghcr.io/${{ env.IMAGE_NAME }}:latest \
          -t ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          $(printf 'ghcr.io/${{ env.IMAGE_NAME }}@sha256:%s ' *)

    - name: Inspect image
      run: |
        docker buildx imagetools inspect ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
